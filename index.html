<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>md2web — Quantica Lab</title>
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="md-styles.css" />
  <!-- highlight.js base theme — we override all token colors in md-styles.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/grayscale-light.min.css" />

  <!-- All libraries loaded as plain UMD scripts so the app works from file:// without a server -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
</head>
<body>

  <!-- ── TOP BAR ──────────────────────────────────────────────────────── -->
  <header class="topbar">
    <a class="topbar__logo" href="#" aria-label="Quantica Lab">
      <img src="assets/quantica-logo-color.png" alt="Quantica Lab" />
    </a>
    <div class="topbar__meta" id="topbar-meta">
      <span class="topbar__hint">Open a .md file to preview it</span>
    </div>
    <div class="topbar__actions">
      <button class="btn-primary" id="btn-open" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
        Open .md file
      </button>
      <button class="btn-secondary" id="btn-pdf" type="button" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><rect x="6" y="14" width="12" height="8"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/></svg>
        Export PDF
      </button>
    </div>
  </header>

  <!-- hidden file input -->
  <input type="file" id="file-input" accept=".md,.markdown,.txt,text/markdown,text/plain" style="display:none" />

  <!-- drop overlay -->
  <div class="drop-overlay" id="drop-overlay" aria-hidden="true">
    <div class="drop-overlay__inner">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span>Drop Markdown file here</span>
    </div>
  </div>

  <!-- main layout -->
  <div class="layout" id="layout">

    <nav class="toc" id="toc" aria-label="Table of contents" hidden>
      <div class="toc__label type-eyebrow">Contents</div>
      <ol class="toc__list" id="toc-list"></ol>
    </nav>

    <main class="main-area" id="main-area">
      <div class="dropzone" id="dropzone">
        <div class="dropzone__q">
          <img src="assets/quantica-q-mark-pink.png" alt="" aria-hidden="true" />
        </div>
        <p class="dropzone__headline type-h2">Open a Markdown file.</p>
        <div class="dropzone__cta">
          <button class="btn-primary btn-primary--lg" id="btn-open-drop" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
            Choose .md file
          </button>
        </div>
        <p class="dropzone__hint type-caption">Or drag and drop a .md file anywhere on this page.</p>
      </div>
    </main>

    <article class="article" id="article" hidden>
      <!-- Per-page printable wrapper: the table's <thead> is repeated on every
           printed page by Chrome (display: table-header-group). On screen the
           table-related elements collapse to a plain block layout via display:contents. -->
      <table class="print-paged" role="presentation">
        <thead>
          <tr><td class="print-paged__top">
            <div class="print-paged__logo" aria-hidden="true">
              <img src="assets/quantica-logo-color.png" alt="" />
            </div>
          </td></tr>
        </thead>
        <tbody>
          <tr><td class="print-paged__main">
            <div id="article-header"></div>
            <div class="article__body" id="article-body"></div>
          </td></tr>
        </tbody>
        <tfoot>
          <tr><td class="print-paged__bottom" aria-hidden="true"></td></tr>
        </tfoot>
      </table>
    </article>

  </div>

  <footer class="site-footer" id="site-footer" hidden>
    <div class="site-footer__bar"></div>
    <div class="site-footer__inner">
      <img src="assets/quantica-logo-color.png" alt="Quantica Lab" class="site-footer__logo" />
      <span class="type-mono">md2web · rendered with the Quantica design system</span>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
